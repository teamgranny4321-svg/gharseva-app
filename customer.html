<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GharSeva - Customer</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f4f6f9; padding: 16px; margin: 0; }
        .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .topbar h2 { margin: 0; font-size: 20px; }
        .logout-link { color: #d9534f; font-size: 13px; cursor: pointer; font-weight: bold; }
        .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
        .tab-btn { flex: 1; padding: 10px; background: white; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; font-weight: bold; color: #555; }
        .tab-btn.active { background: #007bff; color: white; border-color: #007bff; }

        .service-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .service-card { background: white; padding: 14px 10px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.08); text-align: center; cursor: pointer; border: 2px solid transparent; }
        .service-card:active { border-color: #007bff; }
        .service-card .emoji { font-size: 28px; }
        .service-card .name { font-weight: bold; font-size: 13px; margin: 6px 0 2px; }
        .service-card .desc { font-size: 11px; color: #888; }

        .status-box { background: white; padding: 18px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 16px; border-left: 5px solid #007bff; }
        .status-box h3 { margin-top: 0; font-size: 18px; }
        .otp-display { font-weight: bold; color: #ff5722; font-size: 24px; text-align: center; background: #fff3e0; padding: 10px; border-radius: 8px; margin: 10px 0; }
        .worker-info { background: #f0f8ff; padding: 12px; border-radius: 8px; margin: 10px 0; font-size: 14px; border: 1px solid #d0e8ff; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 8px; font-size: 14px; }
        .btn-cancel { background: #fff; color: #d9534f; border: 1px solid #d9534f; }
        .btn-track { background: #28a745; color: white; }
        .btn-rate { background: #ffc107; color: #333; }
        .pulse-dot { display:inline-block; width:10px; height:10px; background:#28a745; border-radius:50%; margin-right:6px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .history-card { background: white; padding: 14px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.08); margin-bottom: 10px; }
        .history-card .h-top { display: flex; justify-content: space-between; font-weight: bold; }
        .history-card .h-meta { font-size: 12px; color: #888; margin-top: 4px; }
        .badge { padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; }
        .badge-completed { background: #d4edda; color: #155724; }
        .badge-cancelled { background: #f8d7da; color: #721c24; }

        .empty-state { text-align: center; color: #999; padding: 40px 10px; }
        .hidden { display: none !important; }

        .star-row { display: flex; justify-content: center; gap: 6px; font-size: 28px; margin: 10px 0; }
        .star { cursor: pointer; color: #ddd; }
        .star.filled { color: #ffc107; }
        
        .section-title { font-size: 16px; font-weight: bold; margin: 20px 0 10px; color: #444; border-bottom: 2px solid #ddd; padding-bottom: 5px; }
    </style>
    <!-- ADDED FIREBASE AUTH SCRIPT FOR PROPER LOGOUT -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="shared.js"></script>
</head>
<body>

    <div class="topbar">
        <h2>🏠 GharSeva</h2>
        <span class="logout-link" onclick="logoutUser()">Logout</span>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="tabBook" onclick="switchTab('book')">Book Service</button>
        <button class="tab-btn" id="tabHistory" onclick="switchTab('history')">History</button>
    </div>

    <div id="bookTab">
        <!-- NAYA FEATURE: Multiple Active Jobs ek sath list honge -->
        <div id="activeJobsContainer" class="hidden">
            <div class="section-title">Aapke Current Jobs</div>
            <div id="activeJobsList"></div>
        </div>

        <div id="serviceSelectView">
            <div class="section-title">Nayi Seva Book Karein</div>
            <div class="service-grid" id="serviceGrid"></div>
        </div>
    </div>

    <div id="historyTab" class="hidden">
        <div id="historyList"></div>
        <div id="historyEmpty" class="empty-state hidden">Abhi koi job history nahi hai.</div>
    </div>

<script>
    const user = getCurrentUser();
    if (!user || user.userType !== 'customer') { window.location.href = 'index.html'; }

    let selectedRatings = {};
    let disputeTimeouts = {};

    // Render Service Grid
    const grid = document.getElementById('serviceGrid');
    SERVICES.forEach(s => {
        const card = document.createElement('div');
        card.className = 'service-card';
        card.innerHTML = `<div class="emoji">${s.emoji}</div><div class="name">${s.name}</div><div class="desc">${s.desc}</div>`;
        card.onclick = () => requestService(s);
        grid.appendChild(card);
    });

    function switchTab(tab) {
        document.getElementById('tabBook').classList.toggle('active', tab === 'book');
        document.getElementById('tabHistory').classList.toggle('active', tab === 'history');
        document.getElementById('bookTab').classList.toggle('hidden', tab !== 'book');
        document.getElementById('historyTab').classList.toggle('hidden', tab !== 'history');
        if (tab === 'history') loadHistory();
    }

    async function requestService(service) {
        if(!confirm(`Kya aap ${service.name} book karna chahte hain?`)) return;

        let myLocation;
        try {
            myLocation = await getMyLocation();
        } catch (e) {
            alert("Location access zaroori hai service request karne ke liye: " + e); return;
        }

        const newJobId = generateJobId();
        firebase.database().ref('jobs/' + newJobId).set({
            jobId: newJobId,
            serviceId: service.id,
            serviceName: service.name,
            serviceEmoji: service.emoji,
            status: "searching",
            customerUid: user.uid,
            customerName: user.name,
            customerPhone: user.phone,
            customerLat: myLocation.lat,
            customerLng: myLocation.lng,
            otpArrival: generateOTP(),
            otpComplete: generateOTP(),
            createdAt: new Date().toISOString()
        });
        
        alert("Booking request chali gayi hai! Aapke 'Current Jobs' section me check karein.");
    }

    // MULTIPLE JOBS LISTENER
    firebase.database().ref('jobs').orderByChild('customerUid').equalTo(user.uid).on('value', snap => {
        const jobs = snap.val();
        const container = document.getElementById('activeJobsContainer');
        const listDiv = document.getElementById('activeJobsList');
        listDiv.innerHTML = '';
        let hasActive = false;

        if (jobs) {
            const jobArr = Object.values(jobs).sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
            jobArr.forEach(job => {
                // Srif Live ya Unrated jobs dikhayenge
                if (['searching', 'accepted', 'started'].includes(job.status) || (job.status === 'completed' && !job.customerRated)) {
                    hasActive = true;
                    listDiv.appendChild(createActiveJobCard(job));
                }
            });
        }

        if (hasActive) {
            container.classList.remove('hidden');
        } else {
            container.classList.add('hidden');
        }
    });

    function createActiveJobCard(job) {
        const card = document.createElement('div');
        card.className = 'status-box';

        let html = `<h3>${job.serviceEmoji} ${job.serviceName}</h3>`;

        if (job.status === 'searching') {
            html += `<p style="margin:5px 0;"><span class="pulse-dot"></span>Searching nearby workers (4km)...</p>
                     <button class="btn btn-cancel" onclick="cancelJob('${job.jobId}')">Cancel Job</button>`;
        } 
        else if (job.status === 'accepted') {
            html += `
                <div class="worker-info">
                    <p style="margin:4px 0;"><b>Worker:</b> ${job.workerName || '-'}</p>
                    <p style="margin:4px 0;"><b>Mobile:</b> <a href="tel:${job.workerPhone}">${job.workerPhone}</a></p>
                    <p style="margin:4px 0;"><b>Rating:</b> ${(job.workerRating || 5).toFixed(1)} ⭐</p>
                </div>
                <p style="margin-bottom:0; font-size:13px; color:#666;">Worker ko ye Arrival OTP bataayein:</p>
                <div class="otp-display">${job.otpArrival}</div>
                <button class="btn btn-track" onclick="openMap('${job.workerLat}', '${job.workerLng}')">📍 Map Par Dekhein</button>
                <button class="btn btn-cancel" onclick="cancelJob('${job.jobId}')">Cancel Job</button>
            `;
        } 
        else if (job.status === 'started') {
            html += `
                <p style="color:#28a745; font-weight:bold; margin:5px 0;">🔧 Kaam Shuru Ho Gaya Hai!</p>
                <p style="margin-bottom:0; font-size:13px; color:#666;">Kaam poora hone par ye Completion OTP bataayein:</p>
                <div class="otp-display">${job.otpComplete}</div>
                <!-- Dispute Cancel Button (hidden initially) -->
                <button id="cancel_${job.jobId}" class="btn btn-cancel hidden" onclick="cancelJob('${job.jobId}')">Cancel Job (Dispute)</button>
            `;

            // 30 MINUTE DISPUTE LOGIC
            if (job.startedAt) {
                const elapsed = Date.now() - job.startedAt;
                const waitTime = 30 * 60 * 1000; // 30 minutes in ms
                if (elapsed >= waitTime) {
                    setTimeout(() => {
                        const btn = card.querySelector(`#cancel_${job.jobId}`);
                        if(btn) btn.classList.remove('hidden');
                    }, 0);
                } else {
                    if(disputeTimeouts[job.jobId]) clearTimeout(disputeTimeouts[job.jobId]);
                    disputeTimeouts[job.jobId] = setTimeout(() => {
                        const btn = document.getElementById(`cancel_${job.jobId}`);
                        if(btn) btn.classList.remove('hidden');
                    }, waitTime - elapsed);
                }
            }
        } 
        else if (job.status === 'completed' && !job.customerRated) {
            html += `
                <p style="color:#28a745; font-weight:bold; text-align:center;">🎉 Kaam Poora Ho Gaya!</p>
                <p style="text-align:center; font-weight:bold; margin-top:10px;">Kaam kaisa raha? Rating dein:</p>
                <div class="star-row" id="starRow_${job.jobId}">
                    <span class="star" data-val="1" onclick="selectStar('${job.jobId}', 1)">★</span>
                    <span class="star" data-val="2" onclick="selectStar('${job.jobId}', 2)">★</span>
                    <span class="star" data-val="3" onclick="selectStar('${job.jobId}', 3)">★</span>
                    <span class="star" data-val="4" onclick="selectStar('${job.jobId}', 4)">★</span>
                    <span class="star" data-val="5" onclick="selectStar('${job.jobId}', 5)">★</span>
                </div>
                <button class="btn btn-rate" onclick="submitRating('${job.jobId}', '${job.workerUid}')">Submit Rating</button>
            `;
        }
        
        card.innerHTML = html;
        return card;
    }

    function cancelJob(jobId) {
        if (!confirm("Pakka job cancel karni hai?")) return;
        firebase.database().ref('jobs/' + jobId).update({ status: "cancelled", cancelledBy: "customer" });
    }

    function openMap(lat, lng) {
        if (lat && lat !== 'undefined') {
            window.open(`https://www.google.com/maps/search/?api=1&query=${lat},${lng}`, '_blank');
        } else {
            alert("Worker ki location abhi available nahi hai.");
        }
    }

    window.selectStar = function(jobId, val) {
        selectedRatings[jobId] = val;
        document.querySelectorAll(`#starRow_${jobId} .star`).forEach(s => {
            s.classList.toggle('filled', parseInt(s.dataset.val) <= val);
        });
    };

    window.submitRating = function(jobId, workerUid) {
        const val = selectedRatings[jobId];
        if (!val) { alert("Pehle stars select karein"); return; }

        firebase.database().ref('jobs/' + jobId).update({ customerRated: true, rating: val });

        if (workerUid) {
            const workerRef = firebase.database().ref('users/' + workerUid);
            workerRef.once('value').then(uSnap => {
                const u = uSnap.val();
                if(u) {
                    const oldCount = u.ratingCount || 0;
                    const oldRating = u.rating || 5;
                    const newCount = oldCount + 1;
                    const newRating = ((oldRating * oldCount) + val) / newCount;
                    workerRef.update({ rating: newRating, ratingCount: newCount });
                }
            });
        }
        alert("Rating Submit Ho Gayi! Dhanyawaad.");
    };

    function loadHistory() {
        const listEl = document.getElementById('historyList');
        const emptyEl = document.getElementById('historyEmpty');
        listEl.innerHTML = '<p style="text-align:center;color:#999;">Loading...</p>';

        firebase.database().ref('jobs').orderByChild('customerUid').equalTo(user.uid).once('value').then(snap => {
            const jobs = snap.val();
            listEl.innerHTML = '';
            if (!jobs) { emptyEl.classList.remove('hidden'); return; }
            emptyEl.classList.add('hidden');

            const jobArr = Object.values(jobs).filter(j => j.status === 'completed' || j.status === 'cancelled');
            jobArr.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

            if (jobArr.length === 0) { emptyEl.classList.remove('hidden'); return; }

            jobArr.forEach(job => {
                const div = document.createElement('div');
                div.className = 'history-card';
                const badge = job.status === 'completed' ? '<span class="badge badge-completed">Completed</span>' : '<span class="badge badge-cancelled">Cancelled</span>';
                div.innerHTML = `
                    <div class="h-top"><span>${job.serviceEmoji || ''} ${job.serviceName}</span>${badge}</div>
                    <div class="h-meta">Worker: ${job.workerName || 'N/A'} | ${new Date(job.createdAt).toLocaleDateString()}</div>
                    ${job.rating ? `<div class="h-meta">Aapki Rating: ${'⭐'.repeat(job.rating)}</div>` : ''}
                `;
                listEl.appendChild(div);
            });
        });
    }
</script>
</body>
</html>
